global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'php-fpm'
    metrics_path: '/status'
    params:
      'json': ['full']
    static_configs:
      - targets: ['localhost:9253']

  - job_name: 'apache'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:9117']

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
